<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0807" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DODOHabit" />
    <title>DODOHabit</title>
    <style>
      /* 預設深色背景，在 JS / CSS bundle 載入前防止白色閃爍 */
      html { background-color: #09090f; }
    </style>
    <script>
      (function () {
        try {
          const raw = localStorage.getItem('dodo_theme')
          const theme = raw ? JSON.parse(raw).state?.theme : null
          if (theme === 'light') {
            document.documentElement.classList.remove('dark')
            document.documentElement.style.backgroundColor = '#f9fafb'
          } else {
            document.documentElement.classList.add('dark')
          }
        } catch {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
